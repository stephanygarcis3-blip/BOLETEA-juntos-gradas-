    <style>
        body {
            margin: 0;

            font-family: Arial, sans-serif;

            box-sizing: border-box;
            text-align: center;

        /* Contenedor del Boleto */
        .ticket-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
            overflow: hidden;
        }
        /* Renderizado normal de la imagen original sin filtros CSS */
        .ticket-img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* Zona Interactiva: Botón Wallet (Izquierda) */
        .wallet-overlay {
            position: absolute;
            left: 15%;
            bottom: 4%;
            width: 33%;
            height: 6%;
            background: rgba(0, 0, 0, 0);
            cursor: pointer;
        }
        /* Zona Interactiva: Botón Redirección Oficial (Derecha) */
        .official-overlay {
            position: absolute;
            right: 15%;
            bottom: 4%;
            width: 33%;
            height: 6%;
            background: rgba(0, 0, 0, 0);
            cursor: pointer;
        }
        /* Botón adicional para Descargar PDF */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #0d6efd; /* Azul Boletea */
            color: #ffffff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            margin-top: 15px;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>

    <button class="download-btn" onclick="descargarBoletoPDF()">

<script>
    function descargarBoletoPDF() {
        const elemento = document.getElementById('ticket-pdf-area');
        
        // Ajustes precisos para compresión exacta en una sola hoja
        const opciones = {
            margin: 0,
            filename: 'Boleto_Palenque_Gomez_Palacio.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true,
                logging: false
            },
            jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid' } // Evita que el contenido se parta en dos hojas
        };

        html2pdf().set(opciones).from(elemento).save();
    }

    // Descarga automática al presionar "Enviar Boleto"
    document.getElementById('btn-enviar-boleto').addEventListener('click', () => {
        setTimeout(descargarBoletoPDF, 500);
    });
</script>
